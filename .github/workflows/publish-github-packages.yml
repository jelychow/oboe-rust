name: Publish GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish when running manually, for example 0.1.0-alpha.6'
        required: true
        default: '0.1.0-alpha.6'
  release:
    types: [published]

concurrency:
  group: github-packages-${{ github.ref }}
  cancel-in-progress: false

env:
  ANDROID_NDK_VERSION: 29.0.14206865

jobs:
  verify-android-wrapper-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve package version
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            version="$RELEASE_TAG"
          else
            version="$MANUAL_VERSION"
          fi
          version="${version#v}"
          if [[ -z "$version" ]]; then
            echo "Package version is empty." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Check Rust formatting
        run: cargo fmt --manifest-path rust/Cargo.toml --all -- --check

      - name: Lint Rust
        run: cargo clippy --manifest-path rust/Cargo.toml --workspace --tests -- -D warnings

      - name: Test Rust
        run: cargo test --manifest-path rust/Cargo.toml

      - name: Check wrapper Android targets
        run: |
          for target in aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android; do
            cargo check --manifest-path rust/Cargo.toml -p oboe-jni --target "$target"
          done

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager_bin="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$sdkmanager_bin" ]]; then
            sdkmanager_bin="$(command -v sdkmanager)"
          fi
          yes | "$sdkmanager_bin" --licenses >/dev/null || true
          "$sdkmanager_bin" "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Build Android JNI libraries
        run: bash tools/build-rust-android.sh
        env:
          RUST_ANDROID_LIBRARIES: oboe-jni

      - name: Validate Maven publication locally
        working-directory: android/oboe-wrapper
        run: ./gradlew :oboe-wrapper:publishReleasePublicationToMavenLocal -PoboeRust.version=${{ steps.version.outputs.version }} -PoboeRust.skipRealtimeKotlin=true --no-daemon --console=plain

      - name: Upload wrapper JNI libraries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oboe-wrapper-jni-libs
          path: android/oboe-wrapper/oboe-wrapper/src/main/jniLibs
          if-no-files-found: error
          retention-days: 1

  publish-android-wrapper-package:
    runs-on: ubuntu-latest
    needs: verify-android-wrapper-package
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Download wrapper JNI libraries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: oboe-wrapper-jni-libs
          path: android/oboe-wrapper/oboe-wrapper/src/main/jniLibs

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager_bin="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$sdkmanager_bin" ]]; then
            sdkmanager_bin="$(command -v sdkmanager)"
          fi
          yes | "$sdkmanager_bin" --licenses >/dev/null || true
          "$sdkmanager_bin" "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Publish Android wrapper to GitHub Packages
        working-directory: android/oboe-wrapper
        run: ./gradlew :oboe-wrapper:publishReleasePublicationToGitHubPackagesRepository -PoboeRust.version=${{ needs.verify-android-wrapper-package.outputs.version }} -PoboeRust.skipRealtimeKotlin=true --no-daemon --console=plain
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published package can be consumed
        shell: bash
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ needs.verify-android-wrapper-package.outputs.version }}
        run: |
          set -euo pipefail

          consumer_dir="${RUNNER_TEMP}/oboe-rust-package-consumer"
          rm -rf "$consumer_dir"
          mkdir -p "$consumer_dir/app/src/main"

          cat > "$consumer_dir/settings.gradle" <<'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven {
                      url = uri("https://maven.pkg.github.com/jelychow/oboe-rust")
                      credentials {
                          username = System.getenv("GITHUB_ACTOR")
                          password = System.getenv("GITHUB_TOKEN")
                      }
                  }
              }
          }

          rootProject.name = 'oboe-rust-package-consumer'
          include ':app'
          GRADLE

          cat > "$consumer_dir/build.gradle" <<'GRADLE'
          plugins {
              id 'com.android.application' version '8.5.1' apply false
          }
          GRADLE

          cat > "$consumer_dir/app/build.gradle" <<GRADLE
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.example.oboerustconsumer'
              compileSdk 34

              defaultConfig {
                  applicationId 'com.example.oboerustconsumer'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }

          dependencies {
              implementation "io.github.jelychow.oboe:oboe-rust-android:${PACKAGE_VERSION}"
          }
          GRADLE

          cat > "$consumer_dir/app/src/main/AndroidManifest.xml" <<'XML'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" />
          XML

          for attempt in 1 2 3; do
              if ./android/oboe-wrapper/gradlew -p "$consumer_dir" :app:assembleDebug --no-daemon --console=plain; then
                  break
              fi
              if [[ "$attempt" == "3" ]]; then
                  exit 1
              fi
              sleep 20
          done

          python3 - <<PY
          import zipfile
          apk = "${consumer_dir}/app/build/outputs/apk/debug/app-debug.apk"
          required = {
              "lib/arm64-v8a/liboboe_jni.so",
              "lib/armeabi-v7a/liboboe_jni.so",
              "lib/x86/liboboe_jni.so",
              "lib/x86_64/liboboe_jni.so",
          }
          with zipfile.ZipFile(apk) as package:
              names = set(package.namelist())
          missing = sorted(required - names)
          if missing:
              raise SystemExit("Missing JNI libraries in consumer APK: " + ", ".join(missing))
          print("Verified published oboe-rust-android package in consumer APK.")
          PY
